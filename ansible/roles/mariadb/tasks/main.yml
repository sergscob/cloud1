- name: Start MariaDB
  shell: |
    cd {{ project_dir }}
    docker compose up -d mariadb

- name: Wait for MariaDB container is up
  shell: |
    cd {{ project_dir }}
    status=$(docker inspect -f '{% raw %}{{.State.Status}} {{if .State.Health}}{{.State.Health.Status}}{{end}} {{.State.ExitCode}}{% endraw %}' mariadb 2>/dev/null || true)
    case "$status" in
      running*|*healthy*) exit 0 ;;
      exited*|dead*) echo "$status"; exit 1 ;;
      *) echo "$status"; exit 1 ;;
    esac
  register: mariadb_state
  changed_when: false
  retries: 20
  delay: 3
  until: mariadb_state.rc == 0
