- name: Install base dependencies
  package:
    name:
      - ca-certificates
      - git
    state: present

- name: Check whether Docker is already installed
  command: docker --version
  register: docker_version_check
  changed_when: false
  failed_when: false

- name: Download Docker install script
  get_url:
    url: https://get.docker.com
    dest: /tmp/get-docker.sh
    mode: '0755'
  when: docker_version_check.rc != 0

- name: Install Docker
  command: sh /tmp/get-docker.sh
  when: docker_version_check.rc != 0

- name: Enable Docker service
  service:
    name: docker
    state: started
    enabled: yes

- name: Clone project
  git:
    repo: "{{ repo_url }}"
    dest: "{{ project_dir }}"
    force: yes

- name: Validate compose secrets are provided
  assert:
    that:
      - mysql_root_password is defined
      - mysql_database is defined
      - mysql_user is defined
      - mysql_password is defined
      - wordpress_url is defined
      - wordpress_admin_user is defined
      - wordpress_admin_password is defined
      - wordpress_admin_email is defined
    fail_msg: "Provide compose secrets via --extra-vars or ansible-vault before running the playbook."

- name: Create compose environment file from variables
  template:
    src: env.j2
    dest: "{{ project_dir }}/.env"
    mode: '0600'