- name: Check HTTPS 
  uri:
    url: https://{{ domain }}
    method: GET
    follow_redirects: none
    validate_certs: false
    status_code:
      - 200
      - 301
      - 302
  register: https_check
  failed_when: false
  changed_when: false

- name: Certbot decision (skip)
  debug:
    msg: "HTTPS already available for {{ domain }} (status={{ https_check.status | default('n/a') }}). Skip certbot."
  when: (https_check.status | default(0)) in [200, 301, 302]

- name: Certbot decision (run)
  debug:
    msg: "HTTPS is not available for {{ domain }} (status={{ https_check.status | default('n/a') }}). Run certbot."
  when: (https_check.status | default(0)) not in [200, 301, 302]

- name: Get SSL certificate via certbot
  when: (https_check.status | default(0)) not in [200, 301, 302]
  block:
    - name: Run certbot 
      shell: |
        cd {{ project_dir }}
        docker compose run --rm certbot certonly \
          --webroot \
          --webroot-path=/var/www/certbot \
          --non-interactive \
          --email admin@{{ domain }} \
          --agree-tos \
          --no-eff-email \
          --keep-until-expiring \
          -d {{ domain }}
      register: certbot_result
      changed_when: certbot_result.rc == 0

    - name: Fail if certbot did not make a certificate
      assert:
        that:
          - certbot_result.rc == 0
        fail_msg: |-
          Certbot failed to get a certificate for {{ domain }}.
          rc={{ certbot_result.rc | default('unset') }}
          stdout={{ certbot_result.stdout | default('') }}
          stderr={{ certbot_result.stderr | default('') }}

- name: Restart nginx to enable HTTPS
  shell: |
    cd {{ project_dir }}
    docker compose restart nginx
  when: certbot_result is defined and (certbot_result.rc | default(1)) == 0

- name: Explain why nginx was not restarted
  debug:
    msg: >-
      Nginx was not restarted because certbot was not run successfully.
      certbot_result: {{ certbot_result | default('not set') }}
  when:  (https_check.status | default(0)) not in [200, 301, 302] and (certbot_result is not defined or (certbot_result.rc | default(1)) != 0)

- name: Install certbot renew cron
  copy:
    dest: /etc/cron.d/certbot-renew
    content: |
      # Run certbot renew daily at 03:00
      0 3 * * * root cd {{ project_dir }} && docker compose run --rm certbot renew --webroot --webroot-path=/var/www/certbot --deploy-hook 'docker compose restart nginx' > /dev/null 2>&1
    mode: '0644'