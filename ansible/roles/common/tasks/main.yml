- name: Install dependencies
  apt:
    name:
      - ca-certificates
      - git
      - curl
      - gnupg
    update_cache: yes

- name: Install Docker dependencies
  apt:
    name:
      - docker.io
      - docker-compose-plugin
    update_cache: yes

- name: Enable Docker
  systemd:
    name: docker
    state: started
    enabled: yes

- name: Verify Docker autostart is enabled
  command: systemctl is-enabled docker
  register: docker_autostart_state
  changed_when: false
  failed_when: docker_autostart_state.stdout.strip() != 'enabled'

- name: Clone project
  git:
    repo: "{{ repo_url }}"
    dest: "{{ project_dir }}"
    force: yes