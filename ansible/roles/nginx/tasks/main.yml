- name: Start nginx only (HTTP bootstrap)
  shell: |
    cd {{ project_dir }}
    docker compose up -d --build nginx

- name: Wait for nginx to stay up
  shell: |
    cd {{ project_dir }}
    status=$(docker inspect -f '{% raw %}{{.State.Status}} {{if .State.Health}}{{.State.Health.Status}}{{end}} {{.State.ExitCode}}{% endraw %}' nginx 2>/dev/null || true)
    case "$status" in
      running*|*healthy*) exit 0 ;;
      exited*|dead*) echo "$status"; exit 1 ;;
      *) echo "$status"; exit 1 ;;
    esac
  register: nginx_state
  retries: 20
  delay: 3
  until: nginx_state.rc == 0

- name: Wait for nginx HTTP
  uri:
    url: http://127.0.0.1
    follow_redirects: none
    status_code:
      - 200
      - 301
  register: nginx_http_result
  retries: 10
  delay: 3
  until: nginx_http_result.status in [200, 301]
