- name: Start WordPress
  shell: |
    cd {{ project_dir }}
    docker compose up -d wordpress

- name: Wait for WordPress to stay up
  shell: |
    cd {{ project_dir }}
    status=$(docker inspect -f '{{.State.Status}} {{if .State.Health}}{{.State.Health.Status}}{{end}} {{.State.ExitCode}}' wordpress 2>/dev/null || true)
    case "$status" in
      running*|*healthy*) exit 0 ;;
      exited*|dead*) echo "$status"; exit 1 ;;
      *) echo "$status"; exit 1 ;;
    esac
  register: wordpress_state
  retries: 20
  delay: 3
  until: wordpress_state.rc == 0
